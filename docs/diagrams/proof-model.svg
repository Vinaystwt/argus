<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <marker id="pa-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4a847"/>
    </marker>
    <marker id="pa-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4db87a"/>
    </marker>
    <marker id="pa-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d94f5a"/>
    </marker>
    <marker id="pa-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a8ed4"/>
    </marker>
    <marker id="pa-muted" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a95a5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#07080a"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#eef1f6">Proof Model</text>
  <text x="450" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8a95a5">Cryptographic trace integrity from execution to on-chain commitment</text>

  <!-- ── TOP ROW: Trace JSON segments ── -->
  <text x="30" y="80" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8a95a5">Trace JSON (6 Segments)</text>

  <!-- Segment boxes -->
  <rect x="30" y="88" width="92" height="50" rx="6" fill="#141820" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="76" y="108" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#d4a847">segment[0]</text>
  <text x="76" y="124" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">metadata</text>

  <rect x="132" y="88" width="92" height="50" rx="6" fill="#141820" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="178" y="108" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#d4a847">segment[1]</text>
  <text x="178" y="124" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">mandate</text>

  <rect x="234" y="88" width="92" height="50" rx="6" fill="#141820" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="280" y="108" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#d4a847">segment[2]</text>
  <text x="280" y="124" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">proposal</text>

  <rect x="336" y="88" width="92" height="50" rx="6" fill="#141820" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="382" y="108" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#d4a847">segment[3]</text>
  <text x="382" y="124" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">checks</text>

  <rect x="438" y="88" width="92" height="50" rx="6" fill="#141820" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="484" y="108" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#d4a847">segment[4]</text>
  <text x="484" y="124" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">verdict</text>

  <rect x="540" y="88" width="92" height="50" rx="6" fill="#141820" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="586" y="108" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#d4a847">segment[5]</text>
  <text x="586" y="124" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">receipt</text>

  <!-- Bracket / merge line from segments to hash box -->
  <line x1="76" y1="138" x2="76" y2="156" stroke="#d4a847" stroke-width="1"/>
  <line x1="178" y1="138" x2="178" y2="156" stroke="#d4a847" stroke-width="1"/>
  <line x1="280" y1="138" x2="280" y2="156" stroke="#d4a847" stroke-width="1"/>
  <line x1="382" y1="138" x2="382" y2="156" stroke="#d4a847" stroke-width="1"/>
  <line x1="484" y1="138" x2="484" y2="156" stroke="#d4a847" stroke-width="1"/>
  <line x1="586" y1="138" x2="586" y2="156" stroke="#d4a847" stroke-width="1"/>
  <line x1="76" y1="156" x2="586" y2="156" stroke="#d4a847" stroke-width="1"/>
  <line x1="331" y1="156" x2="331" y2="172" stroke="#d4a847" stroke-width="1.5" marker-end="url(#pa-amber)"/>

  <!-- Canonical hash box -->
  <rect x="218" y="174" width="226" height="44" rx="6" fill="#0f1217" stroke="#d4a847" stroke-width="1.5"/>
  <text x="331" y="192" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#d4a847">canonical JSON serialize</text>
  <text x="331" y="210" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#eef1f6">keccak256(canonical)</text>

  <!-- Arrow → Trace Root -->
  <line x1="444" y1="196" x2="488" y2="196" stroke="#d4a847" stroke-width="1.5" marker-end="url(#pa-amber)"/>

  <!-- Trace Root box -->
  <rect x="490" y="174" width="140" height="44" rx="6" fill="#141820" stroke="#d4a847" stroke-width="2"/>
  <text x="560" y="193" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#8a95a5">TRACE ROOT</text>
  <text x="560" y="210" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#d4a847">bytes32</text>

  <!-- ── MIDDLE ROW: Two paths (storage URI + on-chain) ── -->

  <!-- Arrow: Trace Root → storageURI path -->
  <line x1="560" y1="218" x2="560" y2="242" stroke="#d4a847" stroke-width="1.5"/>
  <line x1="560" y1="242" x2="720" y2="242" stroke="#d4a847" stroke-width="1.5"/>
  <line x1="720" y1="242" x2="720" y2="258" stroke="#d4a847" stroke-width="1.5" marker-end="url(#pa-amber)"/>

  <!-- Arrow: Trace Root → on-chain commitment path -->
  <line x1="560" y1="242" x2="400" y2="242" stroke="#5a8ed4" stroke-width="1.5"/>
  <line x1="400" y1="242" x2="400" y2="258" stroke="#5a8ed4" stroke-width="1.5" marker-end="url(#pa-blue)"/>

  <!-- 0G Storage URI box -->
  <rect x="640" y="260" width="160" height="44" rx="6" fill="#141820" stroke="#5a8ed4" stroke-width="1.2"/>
  <text x="720" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#5a8ed4">0G Storage</text>
  <text x="720" y="294" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#eef1f6">storageURI pointer</text>

  <!-- TraceCommitment on-chain box -->
  <rect x="310" y="260" width="180" height="44" rx="6" fill="#141820" stroke="#5a8ed4" stroke-width="1.5"/>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#5a8ed4">TraceCommitment</text>
  <text x="400" y="294" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#eef1f6">traceRoot → storageURI</text>

  <!-- Labels -->
  <text x="478" y="237" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#8a95a5">on-chain commit</text>
  <text x="600" y="237" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#8a95a5">blob upload</text>

  <!-- ── BOTTOM ROW: Verifier ── -->
  <text x="30" y="340" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8a95a5">Off-Chain Verification</text>

  <!-- Verifier flow -->
  <rect x="30" y="350" width="130" height="40" rx="6" fill="#0f1217" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="95" y="366" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#eef1f6">fetch trace.json</text>
  <text x="95" y="381" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">from 0G Storage</text>

  <line x1="160" y1="370" x2="182" y2="370" stroke="#d4a847" stroke-width="1.5" marker-end="url(#pa-amber)"/>

  <rect x="184" y="350" width="150" height="40" rx="6" fill="#0f1217" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="259" y="366" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#eef1f6">recompute root</text>
  <text x="259" y="381" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#d4a847">keccak256(canonical)</text>

  <line x1="334" y1="370" x2="356" y2="370" stroke="#d4a847" stroke-width="1.5" marker-end="url(#pa-amber)"/>

  <rect x="358" y="350" width="150" height="40" rx="6" fill="#0f1217" stroke="rgba(229,235,245,0.09)" stroke-width="1"/>
  <text x="433" y="366" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#eef1f6">diff vs on-chain</text>
  <text x="433" y="381" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">root from contract</text>

  <line x1="508" y1="370" x2="530" y2="370" stroke="#d4a847" stroke-width="1.5" marker-end="url(#pa-amber)"/>

  <!-- Result: VALID -->
  <rect x="532" y="350" width="130" height="40" rx="6" fill="#0f1217" stroke="#4db87a" stroke-width="1.5"/>
  <text x="597" y="367" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#4db87a">VALID</text>
  <text x="597" y="382" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">roots match</text>

  <text x="672" y="372" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8a95a5">or</text>

  <!-- Result: TAMPER DETECTED -->
  <rect x="690" y="350" width="180" height="40" rx="6" fill="#0f1217" stroke="#d94f5a" stroke-width="1.5"/>
  <text x="780" y="367" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#d94f5a">TAMPER DETECTED</text>
  <text x="780" y="382" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">root mismatch</text>

  <!-- Dashed line from on-chain commitment down to verifier diff step -->
  <line x1="400" y1="304" x2="400" y2="330" stroke="#5a8ed4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="330" x2="433" y2="330" stroke="#5a8ed4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="433" y1="330" x2="433" y2="348" stroke="#5a8ed4" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#pa-blue)"/>

  <!-- Dashed line from 0G storage down to fetch step -->
  <line x1="720" y1="304" x2="720" y2="330" stroke="#5a8ed4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="720" y1="330" x2="95" y2="330" stroke="#5a8ed4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="95" y1="330" x2="95" y2="348" stroke="#5a8ed4" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#pa-blue)"/>

  <!-- footer -->
  <text x="450" y="410" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="8" fill="#8a95a5">TraceCommitment: 0xdBB3d6e17b34C118BdFd9A73FaECA55C4E814B51  |  Off-chain verifier replays trace JSON and recomputes root</text>
</svg>
