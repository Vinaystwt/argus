<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <!-- Background -->
  <rect width="960" height="520" fill="#0A0A0B"/>

  <!-- Title -->
  <text x="480" y="38" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="2">ARGUS — PROOF PATH</text>
  <text x="480" y="56" fill="#4A5568" font-size="11" text-anchor="middle" letter-spacing="1">mandate → bonded agent → ActionGate → verdict → trace root → 0G Storage → verifier</text>

  <!-- ═══════════════════════════════ -->
  <!-- ROW 1: Operator + Agent         -->
  <!-- ═══════════════════════════════ -->

  <!-- Operator box -->
  <rect x="30" y="90" width="160" height="80" rx="6" fill="#111318" stroke="#2D3748" stroke-width="1.5"/>
  <text x="110" y="115" fill="#E2E8F0" font-size="13" font-weight="700" text-anchor="middle">Operator</text>
  <text x="110" y="133" fill="#718096" font-size="10" text-anchor="middle">defines limits</text>
  <text x="110" y="148" fill="#4A9EFF" font-size="9" text-anchor="middle">MandateRegistry</text>
  <text x="110" y="160" fill="#4A5568" font-size="8" text-anchor="middle">0xB9F3...cefEC9</text>

  <!-- Arrow: Operator → Agent (mandate) -->
  <line x1="190" y1="130" x2="240" y2="130" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="215" y="124" fill="#718096" font-size="8" text-anchor="middle">mandate</text>

  <!-- Agent box -->
  <rect x="240" y="90" width="160" height="80" rx="6" fill="#111318" stroke="#2D3748" stroke-width="1.5"/>
  <text x="320" y="115" fill="#E2E8F0" font-size="13" font-weight="700" text-anchor="middle">Agent</text>
  <text x="320" y="133" fill="#718096" font-size="10" text-anchor="middle">posts bond · requests action</text>
  <text x="320" y="148" fill="#4A9EFF" font-size="9" text-anchor="middle">AgentBonding</text>
  <text x="320" y="160" fill="#4A5568" font-size="8" text-anchor="middle">0x8aE5...cf7E7</text>

  <!-- Arrow: Agent → ActionGate -->
  <line x1="400" y1="130" x2="450" y2="130" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="425" y="124" fill="#718096" font-size="8" text-anchor="middle">action req</text>

  <!-- ═════════════════════════════════════════ -->
  <!-- ON-CHAIN GROUP (0G Mainnet)               -->
  <!-- ═════════════════════════════════════════ -->
  <rect x="440" y="72" width="370" height="120" rx="8" fill="none" stroke="#1A2744" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="625" y="67" fill="#2D5298" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">ON 0G MAINNET  ·  CHAIN ID 16661</text>

  <!-- ActionGate box -->
  <rect x="450" y="90" width="160" height="80" rx="6" fill="#0F1A2E" stroke="#1E3A6E" stroke-width="1.5"/>
  <text x="530" y="115" fill="#93C5FD" font-size="13" font-weight="700" text-anchor="middle">ActionGate</text>
  <text x="530" y="133" fill="#718096" font-size="10" text-anchor="middle">enforces mandate</text>
  <text x="530" y="148" fill="#4A9EFF" font-size="9" text-anchor="middle">approve / reject / slash</text>
  <text x="530" y="160" fill="#4A5568" font-size="8" text-anchor="middle">0xE15D...320f8</text>

  <!-- Arrow: ActionGate → ArgusTrace -->
  <line x1="610" y1="130" x2="650" y2="130" stroke="#1E3A6E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="630" y="124" fill="#4A9EFF" font-size="8" text-anchor="middle">verdict</text>

  <!-- ArgusTrace box -->
  <rect x="650" y="90" width="150" height="80" rx="6" fill="#0F1A2E" stroke="#1E3A6E" stroke-width="1.5"/>
  <text x="725" y="112" fill="#93C5FD" font-size="13" font-weight="700" text-anchor="middle">ArgusTrace</text>
  <text x="725" y="130" fill="#718096" font-size="10" text-anchor="middle">6-segment decision</text>
  <text x="725" y="145" fill="#718096" font-size="10" text-anchor="middle">canonically hashed</text>
  <text x="725" y="160" fill="#4A5568" font-size="8" text-anchor="middle">SHA-256 · deterministic</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 2: TraceCommitment + 0G Storage + Verifier -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Arrow down from ArgusTrace to TraceCommitment -->
  <line x1="725" y1="170" x2="725" y2="230" stroke="#1E3A6E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="737" y="205" fill="#4A9EFF" font-size="8">trace root</text>

  <!-- TraceCommitment box (on-chain) -->
  <rect x="440" y="230" width="180" height="80" rx="6" fill="#0F1A2E" stroke="#1E3A6E" stroke-width="1.5"/>
  <text x="530" y="256" fill="#93C5FD" font-size="13" font-weight="700" text-anchor="middle">TraceCommitment</text>
  <text x="530" y="274" fill="#718096" font-size="10" text-anchor="middle">root committed on-chain</text>
  <text x="530" y="289" fill="#4A9EFF" font-size="9" text-anchor="middle">TraceCommitment.sol</text>
  <text x="530" y="302" fill="#4A5568" font-size="8" text-anchor="middle">0xdBB3...4B51</text>

  <!-- Arrow: ArgusTrace → TraceCommitment (angled) -->
  <line x1="725" y1="230" x2="622" y2="230" stroke="#1E3A6E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Arrow: TraceCommitment → 0G Storage -->
  <line x1="620" y1="270" x2="670" y2="270" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="645" y="263" fill="#718096" font-size="8" text-anchor="middle">payload</text>

  <!-- 0G Storage box -->
  <!-- 0G Storage group box -->
  <rect x="658" y="218" width="190" height="104" rx="8" fill="none" stroke="#1A3A2A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="753" y="213" fill="#276749" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">0G STORAGE LAYER</text>

  <rect x="666" y="230" width="174" height="80" rx="6" fill="#0F1E18" stroke="#276749" stroke-width="1.5"/>
  <text x="753" y="255" fill="#68D391" font-size="13" font-weight="700" text-anchor="middle">0G Storage</text>
  <text x="753" y="273" fill="#718096" font-size="10" text-anchor="middle">full trace payload</text>
  <text x="753" y="288" fill="#68D391" font-size="9" text-anchor="middle">content-addressed</text>
  <text x="753" y="302" fill="#4A5568" font-size="8" text-anchor="middle">0g://0x0d33... · 0g://0xc389...</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 3: Verifier                            -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Arrow down from TraceCommitment to Verifier -->
  <line x1="350" y1="310" x2="350" y2="370" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Arrow from 0G Storage down to Verifier -->
  <line x1="753" y1="322" x2="753" y2="370" stroke="#276749" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Connect TraceCommitment down -->
  <line x1="530" y1="310" x2="530" y2="340" stroke="#1E3A6E" stroke-width="1.5"/>
  <line x1="530" y1="340" x2="350" y2="340" stroke="#1E3A6E" stroke-width="1.5"/>
  <line x1="350" y1="340" x2="350" y2="370" stroke="#1E3A6E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="440" y="334" fill="#4A9EFF" font-size="8" text-anchor="middle">on-chain root</text>

  <!-- Connect 0G Storage down -->
  <line x1="753" y1="322" x2="753" y2="355" stroke="#276749" stroke-width="1.5"/>
  <line x1="753" y1="355" x2="590" y2="355" stroke="#276749" stroke-width="1.5"/>
  <line x1="590" y1="355" x2="590" y2="370" stroke="#276749" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="672" y="349" fill="#68D391" font-size="8" text-anchor="middle">trace payload</text>

  <!-- Verifier box (spans center) -->
  <rect x="240" y="370" width="420" height="90" rx="6" fill="#1A1208" stroke="#744210" stroke-width="1.5"/>
  <text x="450" y="398" fill="#F6AD55" font-size="14" font-weight="700" text-anchor="middle">Verifier</text>
  <text x="450" y="418" fill="#718096" font-size="10" text-anchor="middle">fetch trace from 0G Storage · recompute SHA-256 root · compare with on-chain root</text>
  <text x="450" y="434" fill="#718096" font-size="10" text-anchor="middle">root match → VERIFIED   ·   mismatch → TAMPER DETECTED</text>
  <text x="450" y="450" fill="#F6AD55" font-size="9" text-anchor="middle">anyone can verify · no trusted party required · permanent</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND                                      -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="30" y="380" width="190" height="110" rx="6" fill="#111318" stroke="#2D3748" stroke-width="1"/>
  <text x="125" y="398" fill="#718096" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">LEGEND</text>

  <line x1="48" y1="412" x2="78" y2="412" stroke="#1E3A6E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="90" y="416" fill="#718096" font-size="9">on-chain flow</text>

  <line x1="48" y1="430" x2="78" y2="430" stroke="#276749" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="90" y="434" fill="#718096" font-size="9">storage flow</text>

  <line x1="48" y1="448" x2="78" y2="448" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="90" y="452" fill="#718096" font-size="9">off-chain flow</text>

  <rect x="42" y="460" width="12" height="12" rx="2" fill="#0F1A2E" stroke="#1E3A6E" stroke-width="1"/>
  <text x="62" y="471" fill="#718096" font-size="9">0G Mainnet contract</text>

  <!-- Live TX references -->
  <rect x="30" y="496" width="900" height="18" rx="3" fill="#111318"/>
  <text x="480" y="508" fill="#4A5568" font-size="8" text-anchor="middle">
    compliant tx: 0xaa205f...1a58  ·  slash tx: 0x20305...408a  ·  chain: 0g Mainnet (16661)  ·  useargus.xyz
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D3748"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1E3A6E"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#276749"/>
    </marker>
  </defs>
</svg>
