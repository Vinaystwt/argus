<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <!-- Background -->
  <rect width="860" height="420" fill="#0A0A0B"/>

  <!-- Title -->
  <text x="430" y="36" fill="#FFFFFF" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="2">ARGUS — SYSTEM TRUST BOUNDARIES</text>
  <text x="430" y="54" fill="#4A5568" font-size="10" text-anchor="middle" letter-spacing="1">enforcement is trustless · verification is public · any party can audit</text>

  <!-- ══════════════════════════════════════ -->
  <!-- ZONE 1: Agent Zone                     -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="80" width="230" height="280" rx="10" fill="#111318" stroke="#4A5568" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="145" y="74" fill="#718096" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">AGENT ZONE</text>

  <!-- Operator sub-box -->
  <rect x="48" y="98" width="194" height="75" rx="6" fill="#181C24" stroke="#2D3748" stroke-width="1"/>
  <text x="145" y="120" fill="#E2E8F0" font-size="12" font-weight="700" text-anchor="middle">Operator</text>
  <text x="145" y="138" fill="#718096" font-size="9" text-anchor="middle">defines mandate rules</text>
  <text x="145" y="153" fill="#718096" font-size="9" text-anchor="middle">max amounts · allowed targets</text>
  <text x="145" y="165" fill="#4A5568" font-size="8" text-anchor="middle">MandateRegistry on-chain</text>

  <!-- down arrow inside zone -->
  <line x1="145" y1="173" x2="145" y2="198" stroke="#2D3748" stroke-width="1.5" marker-end="url(#az)"/>
  <text x="157" y="190" fill="#4A5568" font-size="8">deploys</text>

  <!-- Agent sub-box -->
  <rect x="48" y="200" width="194" height="90" rx="6" fill="#181C24" stroke="#2D3748" stroke-width="1"/>
  <text x="145" y="222" fill="#E2E8F0" font-size="12" font-weight="700" text-anchor="middle">Autonomous Agent</text>
  <text x="145" y="240" fill="#718096" font-size="9" text-anchor="middle">observes · reasons · proposes</text>
  <text x="145" y="255" fill="#718096" font-size="9" text-anchor="middle">posts ETH bond before acting</text>
  <text x="145" y="270" fill="#F6AD55" font-size="9" text-anchor="middle">bond = skin in the game</text>
  <text x="145" y="284" fill="#4A5568" font-size="8" text-anchor="middle">AgentBonding · AgentRegistry</text>

  <!-- Zone 1 label -->
  <text x="145" y="348" fill="#4A5568" font-size="8" text-anchor="middle">trusted by operator</text>
  <text x="145" y="360" fill="#4A5568" font-size="8" text-anchor="middle">not trusted by verifier</text>

  <!-- ══════════════════════════════════════ -->
  <!-- ZONE 2: Enforcement Zone (highlighted) -->
  <!-- ══════════════════════════════════════ -->
  <rect x="310" y="80" width="240" height="280" rx="10" fill="#0D1626" stroke="#1E3A6E" stroke-width="2"/>
  <text x="430" y="74" fill="#4A9EFF" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">ENFORCEMENT ZONE</text>

  <!-- Trustless badge -->
  <rect x="370" y="82" width="120" height="16" rx="3" fill="#1E3A6E"/>
  <text x="430" y="94" fill="#93C5FD" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1">TRUSTLESS · ON-CHAIN</text>

  <!-- ActionGate sub-box -->
  <rect x="326" y="108" width="208" height="80" rx="6" fill="#0F1A2E" stroke="#2D5298" stroke-width="1.5"/>
  <text x="430" y="130" fill="#93C5FD" font-size="12" font-weight="700" text-anchor="middle">ActionGate</text>
  <text x="430" y="148" fill="#718096" font-size="9" text-anchor="middle">checks every action against mandate</text>
  <text x="430" y="163" fill="#4A9EFF" font-size="9" text-anchor="middle">approve / reject / slash (atomic)</text>
  <text x="430" y="178" fill="#4A5568" font-size="8" text-anchor="middle">0xE15D...320f8</text>

  <!-- down arrow -->
  <line x1="430" y1="188" x2="430" y2="213" stroke="#1E3A6E" stroke-width="1.5" marker-end="url(#ez)"/>
  <text x="442" y="205" fill="#4A9EFF" font-size="8">verdict + trace</text>

  <!-- ArgusTrace sub-box -->
  <rect x="326" y="215" width="208" height="80" rx="6" fill="#0F1A2E" stroke="#2D5298" stroke-width="1.5"/>
  <text x="430" y="237" fill="#93C5FD" font-size="12" font-weight="700" text-anchor="middle">TraceCommitment</text>
  <text x="430" y="255" fill="#718096" font-size="9" text-anchor="middle">6-segment ArgusTrace</text>
  <text x="430" y="270" fill="#718096" font-size="9" text-anchor="middle">SHA-256 root → on-chain</text>
  <text x="430" y="285" fill="#4A9EFF" font-size="9" text-anchor="middle">immutable · permanent</text>
  <text x="430" y="300" fill="#4A5568" font-size="8" text-anchor="middle">0xdBB3...4B51</text>

  <!-- Zone 2 note -->
  <text x="430" y="342" fill="#2D5298" font-size="8" text-anchor="middle">no admin key · no upgrade path</text>
  <text x="430" y="354" fill="#2D5298" font-size="8" text-anchor="middle">mandate is law on-chain</text>

  <!-- ══════════════════════════════════════ -->
  <!-- ZONE 3: Verification Zone              -->
  <!-- ══════════════════════════════════════ -->
  <rect x="600" y="80" width="230" height="280" rx="10" fill="#0A1710" stroke="#276749" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="715" y="74" fill="#68D391" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">VERIFICATION ZONE</text>

  <!-- 0G Storage sub-box -->
  <rect x="618" y="98" width="194" height="75" rx="6" fill="#0F1E18" stroke="#276749" stroke-width="1"/>
  <text x="715" y="120" fill="#68D391" font-size="12" font-weight="700" text-anchor="middle">0G Storage</text>
  <text x="715" y="138" fill="#718096" font-size="9" text-anchor="middle">full trace payload archived</text>
  <text x="715" y="153" fill="#718096" font-size="9" text-anchor="middle">content-addressed · permanent</text>
  <text x="715" y="165" fill="#4A5568" font-size="8" text-anchor="middle">0g://0x0d33... · 0g://0xc389...</text>

  <!-- down arrow -->
  <line x1="715" y1="173" x2="715" y2="198" stroke="#276749" stroke-width="1.5" marker-end="url(#vz)"/>
  <text x="727" y="190" fill="#68D391" font-size="8">fetch + verify</text>

  <!-- Verifier sub-box -->
  <rect x="618" y="200" width="194" height="100" rx="6" fill="#0F1E18" stroke="#276749" stroke-width="1"/>
  <text x="715" y="222" fill="#68D391" font-size="12" font-weight="700" text-anchor="middle">Public Verifier</text>
  <text x="715" y="240" fill="#718096" font-size="9" text-anchor="middle">fetch trace from 0G Storage</text>
  <text x="715" y="255" fill="#718096" font-size="9" text-anchor="middle">recompute SHA-256 root</text>
  <text x="715" y="270" fill="#68D391" font-size="9" text-anchor="middle">match → VERIFIED</text>
  <text x="715" y="285" fill="#FC8181" font-size="9" text-anchor="middle">mismatch → TAMPER DETECTED</text>
  <text x="715" y="298" fill="#4A5568" font-size="8" text-anchor="middle">useargus.xyz/verify</text>

  <!-- Zone 3 note -->
  <text x="715" y="342" fill="#276749" font-size="8" text-anchor="middle">open · permissionless</text>
  <text x="715" y="354" fill="#276749" font-size="8" text-anchor="middle">any party · any time</text>

  <!-- ══════════════════════════════════════ -->
  <!-- INTER-ZONE ARROWS                      -->
  <!-- ══════════════════════════════════════ -->

  <!-- Agent Zone → Enforcement Zone -->
  <line x1="260" y1="250" x2="308" y2="250" stroke="#4A5568" stroke-width="1.5" marker-end="url(#az2)"/>
  <text x="284" y="244" fill="#4A5568" font-size="8" text-anchor="middle">action</text>
  <text x="284" y="256" fill="#4A5568" font-size="8" text-anchor="middle">request</text>

  <!-- Enforcement Zone → Verification Zone -->
  <line x1="550" y1="200" x2="598" y2="200" stroke="#1E3A6E" stroke-width="1.5" marker-end="url(#ez2)"/>
  <text x="574" y="185" fill="#4A9EFF" font-size="8" text-anchor="middle">trace root</text>
  <text x="574" y="197" fill="#4A9EFF" font-size="8" text-anchor="middle">on-chain</text>

  <line x1="550" y1="260" x2="598" y2="260" stroke="#276749" stroke-width="1.5" marker-end="url(#vz2)"/>
  <text x="574" y="254" fill="#68D391" font-size="8" text-anchor="middle">payload</text>
  <text x="574" y="266" fill="#68D391" font-size="8" text-anchor="middle">to storage</text>

  <!-- ══════════════════════════════════════ -->
  <!-- BOTTOM BAR                             -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="378" width="800" height="32" rx="4" fill="#111318"/>
  <text x="430" y="390" fill="#4A5568" font-size="8" text-anchor="middle">
    contracts live on 0G Mainnet · chain ID 16661 · chainscan.0g.ai
  </text>
  <text x="430" y="404" fill="#4A5568" font-size="8" text-anchor="middle">
    compliant tx: 0xaa205f...1a58  ·  slash tx: 0x20305...408a  ·  useargus.xyz
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="az" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#2D3748"/>
    </marker>
    <marker id="ez" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#1E3A6E"/>
    </marker>
    <marker id="vz" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#276749"/>
    </marker>
    <marker id="az2" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#4A5568"/>
    </marker>
    <marker id="ez2" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#1E3A6E"/>
    </marker>
    <marker id="vz2" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#276749"/>
    </marker>
  </defs>
</svg>
