<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b88a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eye-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a8ed4;stop-opacity:1" />
    </linearGradient>
    <filter id="amber-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#07080a"/>

  <!-- Outer hexagon outline -->
  <polygon
    points="256,60 430,158 430,354 256,452 82,354 82,158"
    fill="none"
    stroke="#1a1f2a"
    stroke-width="2"
  />

  <!-- Inner structural lines -->
  <line x1="256" y1="60" x2="256" y2="150" stroke="#141820" stroke-width="1.5"/>
  <line x1="256" y1="362" x2="256" y2="452" stroke="#141820" stroke-width="1.5"/>
  <line x1="82" y1="158" x2="150" y2="196" stroke="#141820" stroke-width="1.5"/>
  <line x1="362" y1="196" x2="430" y2="158" stroke="#141820" stroke-width="1.5"/>
  <line x1="82" y1="354" x2="150" y2="316" stroke="#141820" stroke-width="1.5"/>
  <line x1="362" y1="316" x2="430" y2="354" stroke="#141820" stroke-width="1.5"/>

  <!-- Core diamond outline -->
  <polygon
    points="256,130 370,256 256,382 142,256"
    fill="none"
    stroke="#1a1f2a"
    stroke-width="2"
  />

  <!-- Eye oval — outer glow -->
  <ellipse cx="256" cy="256" rx="90" ry="56" fill="none" stroke="url(#eye-grad)" stroke-width="2.5" filter="url(#amber-glow)"/>

  <!-- Eye oval — inner fill -->
  <ellipse cx="256" cy="256" rx="88" ry="54" fill="#0f1217"/>

  <!-- Iris ring -->
  <circle cx="256" cy="256" r="34" fill="none" stroke="url(#amber-grad)" stroke-width="2"/>
  <circle cx="256" cy="256" r="32" fill="#141820"/>

  <!-- Pupil block -->
  <rect x="242" y="242" width="28" height="28" rx="4" fill="url(#amber-grad)"/>

  <!-- Pupil hash marks -->
  <line x1="248" y1="252" x2="264" y2="252" stroke="#07080a" stroke-width="1.5"/>
  <line x1="248" y1="258" x2="264" y2="258" stroke="#07080a" stroke-width="1.5"/>
  <line x1="248" y1="264" x2="264" y2="264" stroke="#07080a" stroke-width="1.5"/>

  <!-- Accent dots on ellipse ends — amber -->
  <circle cx="166" cy="256" r="3.5" fill="#d4a847"/>
  <circle cx="346" cy="256" r="3.5" fill="#d4a847"/>

  <!-- Corner accent dots — surface -->
  <circle cx="256" cy="130" r="3" fill="#1a1f2a"/>
  <circle cx="370" cy="256" r="3" fill="#1a1f2a"/>
  <circle cx="256" cy="382" r="3" fill="#1a1f2a"/>
  <circle cx="142" cy="256" r="3" fill="#1a1f2a"/>

  <!-- ARGUS wordmark -->
  <text
    x="256"
    y="435"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="10"
    text-anchor="middle"
    fill="#eef1f6"
  >ARGUS</text>

  <!-- Tagline -->
  <text
    x="256"
    y="460"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#545e6e"
  >MANDATE ENFORCEMENT</text>
</svg>
